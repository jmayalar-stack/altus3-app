    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));

    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';

      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');

    const templateEl = document.querySelector('script[type="__bundler/template"]');

    const templateData = JSON.parse(templateEl.textContent);

    const entryId = templateData.entry;

    const extResources = extResEl ? JSON.parse(extResEl.textContent) : {};

    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];

        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {

            const reader = ds.readable.getReader();

            'e.preventDefault();' +

              'if (window.__bundler_pages.indexOf(pid) >= 0) { parent.location.hash = h; return; }' +

      // root element. Scripts inserted via DOMParser/replaceWith are inert per

        // load/error, so awaiting would hang forever.

      // which fired before we swapped the document. Trigger manually if present.
      if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {

      }

    }

    // in its own realm while staying same-origin with the parent (so asset
    // blob URLs load and parent.location is writable).
    var frame = document.createElement('iframe');
    frame.id = '__bundler_frame';
    frame.setAttribute('style', 'position:fixed;inset:0;width:100%;height:100%;border:0;background:#fff');
    document.body.appendChild(frame);

    function decode(s) {
      try { return decodeURIComponent(s); } catch (e) { return s; }
    }
    function route() {
      var h = (location.hash || '');
      if (h.slice(0, 2) !== '#/') return { id: entryId, anchor: '' };
      h = h.slice(2);
      var i = h.indexOf(':');
      return i < 0 ? { id: decode(h), anchor: '' }
                   : { id: decode(h.slice(0, i)), anchor: decode(h.slice(i + 1)) };
    }

    var current = null;
    var navGen = 0;
    function navigate() {
      var r = route();
      var id = Object.prototype.hasOwnProperty.call(pages, r.id) ? r.id : entryId;
      if (current === id) {
        // Same-page anchor change: the iframe's own hash handles this, so
        // normally we don't reach here. If we do (e.g. a programmatic
        // parent.location.hash change), nudge the iframe.
        var cw = frame.contentWindow;
        if (!cw) return;
        var el = r.anchor && cw.document.getElementById(r.anchor);
        if (el) el.scrollIntoView({ behavior: 'smooth' });
        else cw.scrollTo({ top: 0, behavior: 'smooth' });
        return;

      var gen = ++navGen;
      frame.onload = function() {

        // location.href=) re-fires onload with the same gen; after that the
        // iframe may be cross-origin, and cw.* access would throw.
        frame.onload = null;
        if (gen !== navGen) return;
        var cw = frame.contentWindow;
        try { cw.document.title && (document.title = cw.document.title); } catch (e) {}

                     document.getElementById('__bundler_placeholder');
        if (splash) splash.remove();
        if (loading) loading.remove();
        var el = r.anchor && cw.document.getElementById(r.anchor);
        if (el) el.scrollIntoView();
        else cw.scrollTo(0, 0);

    setStatus('Error unpacking: ' + err.message);

al;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"1a885e02-0447-42bf-b421-2b8d4ae2fcb1\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n*{box-sizing:border-box;}\nhtml,body{margin:0;padding:0;}\nbody{-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;}\nhtml{scroll-behavior:smooth;}\ninput,textarea,button{font-family:inherit;}\na{text-decoration:none;}\n@keyframes alt-spin{to{transform:rotate(360deg);}}\n@keyframes alt-spinrev{to{transform:rotate(-360deg);}}\n@keyframes alt-fadeup{from{opacity:0;transform:translateY(26px);}to{opacity:1;transform:translateY(0);}}\n@keyframes alt-fadein{from{opacity:0;}to{opacity:1;}}\n@keyframes alt-floaty{0%,100%{transform:translateY(0);}50%{transform:translateY(-16px);}}\n@keyframes alt-dash{to{stroke-dashoffset:-340;}}\n@keyframes alt-grow{from{transform:scaleX(0);}to{transform:scaleX(1);}}\n@keyframes orb-spin{to{transform:rotate(360deg);}}\n@keyframes orb-rev{to{transform:rotate(-360deg);}}\n@media(max-width:880px){\n [data-desk]{display:none !important;}\n [data-burger]{display:flex !important;}\n}\n@media(max-width:620px){\n [data-form]{grid-template-columns:1fr !important;}\n}\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"min-height:100vh;background:#FFFFFF;font-family:'Hanken Grotesk',sans-serif;color:#2B2B2D;overflow-x:hidden;\">\n\n<header style=\"position:sticky;top:0;z-index:50;background:rgba(255,255,255,0.92);backdrop-filter:blur(10px);border-bottom:1px solid #ECEAEA;\">\n <div style=\"max-width:1240px;margin:0 auto;padding:0 clamp(20px,5vw,48px);height:74px;display:flex;align-items:center;justify-content:space-between;\">\n  <a onclick=\"{{ goInicio }}\" style=\"display:flex;align-items:center;gap:11px;cursor:pointer;\">\n   <svg viewBox=\"0 0 120 100\" width=\"34\" height=\"28\" style=\"display:block;overflow:visible;\">\n    <line x1=\"8\" y1=\"50\" x2=\"48\" y2=\"50\" stroke=\"#6D6E71\" stroke-width=\"6\" stroke-linecap=\"round\"><\u002Fline>\n    <line x1=\"48\" y1=\"50\" x2=\"106\" y2=\"9\" stroke=\"#B8257F\" stroke-width=\"6\" stroke-linecap=\"round\"><\u002Fline>\n    <line x1=\"48\" y1=\"50\" x2=\"106\" y2=\"91\" stroke=\"#B8257F\" stroke-width=\"6\" stroke-linecap=\"round\"><\u002Fline>\n    <circle cx=\"48\" cy=\"50\" r=\"10\" fill=\"#C9A961\"><\u002Fcircle>\n   <\u002Fsvg>\n   <span style=\"font-family:'Spectral',serif;font-weight:600;font-size:23px;letter-spacing:2px;color:#3A3A3C;\">ALTUS<sup style=\"font-size:9px;top:-9px;color:#6D6E71;\">®<\u002Fsup><\u002Fspan>\n  <\u002Fa>\n  <nav data-desk=\"\" style=\"display:flex;align-items:center;gap:30px;\">\n   <sc-for list=\"{{ nav }}\" as=\"item\" hint-placeholder-count=\"5\">\n    <a onclick=\"{{ item.go }}\" style=\"{{ item.style }}\" style-hover=\"color:#B8257F;\">{{ item.label }}<\u002Fa>\n   <\u002Fsc-for>\n   <button onclick=\"{{ goContacto }}\" style=\"background:#B8257F;color:#fff;border:none;padding:12px 22px;border-radius:3px;font-weight:600;font-size:13.5px;letter-spacing:.3px;cursor:pointer;transition:background .2s;\" style-hover=\"background:#9c1d6b;\">Solicitar Diagnóstico<\u002Fbutton>\n  <\u002Fnav>\n  <button data-burger=\"\" onclick=\"{{ toggleMenu }}\" style=\"display:none;flex-direction:column;gap:5px;background:none;border:none;cursor:pointer;padding:8px;\">\n   <span style=\"width:24px;height:2px;background:#3A3A3C;display:block;\"><\u002Fspan>\n   <span style=\"width:24px;height:2px;background:#3A3A3C;display:block;\"><\u002Fspan>\n   <span style=\"width:24px;height:2px;background:#3A3A3C;display:block;\"><\u002Fspan>\n  <\u002Fbutton>\n <\u002Fdiv>\n <sc-if value=\"{{ menuOpen }}\" hint-placeholder-val=\"{{ false }}\">\n  <div style=\"border-top:1px solid #ECEAEA;background:#fff;padding:14px clamp(20px,5vw,48px) 22px;display:flex;flex-direction:column;gap:4px;\">\n   <sc-for list=\"{{ nav }}\" as=\"item\" hint-placeholder-count=\"5\">\n    <a onclick=\"{{ item.go }}\" style=\"{{ item.mstyle }}\">{{ item.label }}<\u002Fa>\n   <\u002Fsc-for>\n   <button onclick=\"{{ goContacto }}\" style=\"margin-top:10px;background:#B8257F;color:#fff;border:none;padding:14px;border-radius:3px;font-weight:600;cursor:pointer;\">Solicitar Diagnóstico<\u002Fbutton>\n  <\u002Fdiv>\n <\u002Fsc-if>\n<\u002Fheader>\n\n<!-- ============ INICIO ============ -->\n<sc-if value=\"{{ isInicio }}\" hint-placeholder-val=\"{{ true }}\">\n<main data-screen-label=\"Inicio\">\n\n <section style=\"position:relative;max-width:1240px;margin:0 auto;padding:clamp(48px,7vw,96px) clamp(20px,5vw,48px) clamp(40px,6vw,80px);display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:clamp(40px,5vw,72px);align-items:center;\">\n  <div style=\"animation:alt-fadeup .8s ease both;\">\n   <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:24px;\">\n    <span style=\"width:34px;height:2px;background:#C9A961;display:block;\"><\u002Fspan>\n    <span style=\"font-size:12px;font-weight:600;letter-spacing:2.5px;text-transform:uppercase;color:#6D6E71;\">Sistema de Conducción Estratégica en Salud<\u002Fspan>\n   <\u002Fdiv>\n   <h1 style=\"font-family:'Spectral',serif;font-weight:700;font-size:clamp(38px,5.4vw,64px);line-height:1.04;letter-spacing:-1px;margin:0 0 24px;color:#2B2B2D;\">Del caos operativo<br>al <span style=\"color:#B8257F;\">control estratégico.<\u002Fspan><\u002Fh1>\n   <p style=\"font-size:clamp(16px,1.7vw,19px);line-height:1.65;color:#5A5A5D;max-width:520px;margin:0 0 36px;\">Conducimos el crecimiento de clínicas, laboratorios y profesionales médicos a través de planes de estructuración, mentoría y comunicación de alto impacto.<\u002Fp>\n   <div style=\"display:flex;flex-wrap:wrap;gap:14px;\">\n    <button onclick=\"{{ goContacto }}\" style=\"background:#B8257F;color:#fff;border:none;padding:17px 32px;border-radius:3px;font-weight:600;font-size:15px;letter-spacing:.3px;cursor:pointer;transition:background .2s;box-shadow:0 10px 30px -12px rgba(184,37,127,.55);\" style-hover=\"background:#9c1d6b;\">Solicitar Diagnóstico Estratégico<\u002Fbutton>\n    <button onclick=\"{{ goSistema }}\" style=\"background:transparent;color:#3A3A3C;border:1.5px solid #D8D6D6;padding:17px 30px;border-radius:3px;font-weight:600;font-size:15px;cursor:pointer;transition:all .2s;\" style-hover=\"border-color:#B8257F;color:#B8257F;\">Conocer el Sistema<\u002Fbutton>\n   <\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"position:relative;aspect-ratio:1/1;max-width:480px;width:100%;justify-self:center;border-radius:5px;background:linear-gradient(150deg,#B8257F 0%,#8f1c63 100%);display:flex;align-items:center;justify-content:center;overflow:hidden;box-shadow:0 40px 80px -30px rgba(184,37,127,.5);animation:alt-fadein 1.2s ease both;\">\n   <div style=\"position:absolute;top:24px;right:24px;width:54px;height:54px;border:1.5px solid rgba(201,169,97,.6);border-radius:50%;\"><\u002Fdiv>\n   <div style=\"position:absolute;bottom:30px;left:30px;font-family:'Hanken Grotesk';font-size:11px;letter-spacing:3px;color:rgba(255,255,255,.55);text-transform:uppercase;\">Punto de decisión<\u002Fdiv>\n   <svg viewBox=\"0 0 120 100\" width=\"62%\" style=\"display:block;overflow:visible;animation:alt-floaty 6s ease-in-out infinite;\">\n    <line x1=\"8\" y1=\"50\" x2=\"48\" y2=\"50\" stroke=\"rgba(255,255,255,.85)\" stroke-width=\"4\" stroke-linecap=\"round\"><\u002Fline>\n    <line x1=\"48\" y1=\"50\" x2=\"112\" y2=\"6\" stroke=\"#fff\" stroke-width=\"4\" stroke-linecap=\"round\"><\u002Fline>\n    <line x1=\"48\" y1=\"50\" x2=\"112\" y2=\"94\" stroke=\"#fff\" stroke-width=\"4\" stroke-linecap=\"round\"><\u002Fline>\n    <circle cx=\"48\" cy=\"50\" r=\"9\" fill=\"#C9A961\"><\u002Fcircle>\n   <\u002Fsvg>\n  <\u002Fdiv>\n <\u002Fsection>\n\n <!-- El Problema -->\n <section style=\"background:#F5F5F5;padding:clamp(56px,7vw,100px) clamp(20px,5vw,48px);\">\n  <div style=\"max-width:1080px;margin:0 auto;\">\n   <div style=\"text-align:center;max-width:680px;margin:0 auto clamp(40px,5vw,60px);\">\n    <span style=\"font-size:12px;font-weight:600;letter-spacing:2.5px;text-transform:uppercase;color:#B8257F;\">El desafío<\u002Fspan>\n    <h2 style=\"font-family:'Spectral',serif;font-weight:700;font-size:clamp(30px,4vw,46px);line-height:1.12;letter-spacing:-.5px;margin:14px 0 0;color:#2B2B2D;\">El crecimiento sostenible requiere un sistema.<\u002Fh2>\n   <\u002Fdiv>\n   <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:20px;margin-bottom:clamp(34px,4vw,48px);\">\n    <sc-for list=\"{{ problemas }}\" as=\"p\" hint-placeholder-count=\"3\">\n     <div style=\"background:#fff;border:1px solid #EAE8E8;border-top:3px solid #C9A961;border-radius:4px;padding:30px 26px;\">\n      <div style=\"font-family:'Spectral',serif;font-size:15px;font-weight:600;letter-spacing:1px;color:#C9A961;margin-bottom:16px;\">{{ p.n }}<\u002Fdiv>\n      <p style=\"font-size:16.5px;line-height:1.55;font-weight:600;color:#3A3A3C;margin:0;\">{{ p.t }}<\u002Fp>\n     <\u002Fdiv>\n    <\u002Fsc-for>\n   <\u002Fdiv>\n   <p style=\"max-width:760px;margin:0 auto;text-align:center;font-size:17px;line-height:1.7;color:#5A5A5D;\">Dirigir una organización de salud implica equilibrar la excelencia médica, las exigencias regulatorias y la eficiencia operativa. El desorden en los procesos internos o una comunicación deficiente limitan el verdadero potencial de la institución.<\u002Fp>\n  <\u002Fdiv>\n <\u002Fsection>\n\n <!-- La Solución: Sistema ALTUS -->\n <section style=\"padding:clamp(56px,8vw,110px) clamp(20px,5vw,48px);\">\n  <div style=\"max-width:1180px;margin:0 auto;display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:clamp(36px,5vw,64px);align-items:center;\">\n   <div>\n    <span style=\"font-size:12px;font-weight:600;letter-spacing:2.5px;text-transform:uppercase;color:#6D6E71;\">La solución · El Sistema ALTUS<\u002F y=\"50\" r=\"10\" fill=\"#C9A961\"><\u002Fcircle>\n   <\u002Fsvg>\n   <p style=\"font-family:'Spectral',serif;font-weight:500;font-size:clamp(24px,3.4vw,40px);line-height:1.32;letter-spacing:-.3px;margin:0;color:{{ bandText }};\">«Ayudamos a las organizaciones y profesionales de la salud a pasar del caos operativo al control estratégico mediante un sistema integrado de organización, mentoría y comunicación.»<\u002Fp>\n  <\u002Fdiv>\n <\u002Fsection>\n\n <!-- CTA cierre -->\n <section style=\"padding:clamp(56px,7vw,96px) clamp(20px,5vw,48px);text-align:center;\">\n  <div style=\"max-width:680px;margin:0 auto;\">\n   <h2 style=\"font-family:'Spectral',serif;font-weight:700;font-size:clamp(28px,3.6vw,42px);line-height:1.14;letter-spacing:-.5px;margin:0 0 18px;color:#2B2B2D;\">¿Listo para conducir su crecimiento?<\u002Fh2>\n   <p style=\"font-size:17px;line-height:1.6;color:#5A5A5D;margin:0 0 30px;\">Iniciemos con un diagnóstico estratégico de su organización.<\u002Fp>\n   <button onclick=\"{{ goContacto }}\" style=\"background:#B8257F;color:#fff;border:none;padding:18px 36px;border-radius:3px;font-weight:600;font-size:15.5px;cursor:pointer;transition:background .2s;box-shadow:0 12px 32px -14px rgba(184,37,127,.55);\" style-hover=\"background:#9c1d6b;\">Solicitar Diagnóstico Estratégico<\u002Fbutton>\n  <\u002Fdiv>\n <\u002Fsection>\n\n<\u002Fmain>\n<\u002Fsc-if>\n\n<!-- ============ EL SISTEMA ============ -->\n<sc-if value=\"{{ isSistema }}\" hint-placeholder-val=\"{{ false }}\">\n<main data-screen-label=\"El Sistema\">\n <section style=\"background:#2B2B2D;color:#fff;padding:clamp(56px,7vw,96px) clamp(20px,5vw,48px);\">\n  <div style=\"max-width:900px;margin:0 auto;text-align:center;animation:alt-fadeup .7s ease both;\">\n   <span style=\"font-size:12px;font-weight:600;letter-spacing:2.5px;text-transform:uppercase;color:#C9A961;\">El Sistema de Conducción ALTUS<\u002Fspan>\n   <h1 style=\"font-family:'Spectral',serif;font-weight:700;font-size:clamp(34px,5vw,58px);line-height:1.08;letter-spacing:-.8px;margin:16px 0 20px;\">Un método validado, no acciones aisladas.<\u002Fh1>\n   <p style=\"font-size:18px;line-height:1.65;color:#C9C9CC;max-width:660px;margin:0 auto;\">El sector salud confía en los procesos validados. Nuestro Sistema de Conducción ordena la operación, potencia al liderazgo y proyecta una reputación impecable.<\u002Fp>\n  <\u002Fdiv>\n <\u002Fsection>\n\n <section style=\"padding:clamp(50px,6vw,84px) clamp(20px,5vw,48px);background:#F5F5F5;\">\n  <div style=\"max-width:1100px;margin:0 auto;display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:clamp(36px,5vw,60px);align-items:center;\">\n   <div style=\"display:flex;justify-content:center;\"><div style=\"position:relative;width:clamp(248px,72vw,440px);height:clamp(248px,72vw,440px);\">\n <div style=\"position:absolute;inset:0;animation:orb-spin 50s linear infinite;animation-play-state:{{ orbitPlay }};\">\n  <svg viewBox=\"0 0 100 100\" preserveAspectRatio=\"none\" style=\"position:absolute;inset:0;width:100%;height:100%;overflow:visible;\">\n   <circle cx=\"50\" cy=\"50\" r=\"43\" fill=\"none\" stroke=\"#E2E0E0\" stroke-width=\"0.4\" stroke-dasharray=\"1.4 2.4\"><\u002Fcircle>\n   <line x1=\"50\" y1=\"50\" x2=\"50\" y2=\"9\" stroke=\"#6D6E71\" stroke-width=\"0.7\"><\u002Fline>\n   <line x1=\"50\" y1=\"50\" x2=\"14.5\" y2=\"79\" stroke=\"#B8257F\" stroke-width=\"0.7\"><\u002Fline>\n   <line x1=\"50\" y1=\"50\" x2=\"85.5\" y2=\"79\" stroke=\"#C9A961\" stroke-width=\"0.7\"><\u002Fline>\n   <circle cx=\"50\" cy=\"9\" r=\"1.6\" fill=\"#6D6E71\"><\u002Fcircle>\n   <circle cx=\"14.5\" cy=\"79\" r=\"1.6\" fill=\"#B8257F\"><\u002Fcircle>\n   <circle cx=\"85.5\" cy=\"79\" r=\"1.6\" fill=\"#C9A961\"><\u002Fcircle>\n  <\u002Fsvg>\n  <div style=\"position:absolute;left:50%;top:9%;width:0;height:0;\">\n   <div style=\"position:absolute;transform:translate(-50%,-50%);animation:orb-rev 50s linear infinite;animation-play-state:{{ orbitPlay }};\">\n    <div style=\ n  <\u002Fdiv>\n <\u002Fdiv>\n <div style=\"position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:26%;height:26%;border-radius:50%;background:radial-gradient(circle at 35% 30%,#d8bd83,#C9A961);display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:0 16px 36px -14px rgba(201,169,97,.7);\">\n  <span style=\"font-family:'Spectral',serif;font-weight:700;font-size:clamp(15px,3.4vw,21px);letter-spacing:2px;color:#fff;\">ALTUS<\u002Fspan>\n  <span style=\"font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.8);margin-top:2px;\">Sistema<\u002Fspan>\n <\u002Fdiv>\n<\u002Fdiv><\u002Fdiv>\n   <div>\n    <h2 style=\"font-family:'Spectral',serif;font-weight:700;font-size:clamp(26px,3.2vw,38px);line-height:1.16;letter-spacing:-.5px;margin:0 0 18px;color:#2B2B2D;\">Organización, Mentoría y Comunicación en un solo engranaje.<\u002Fh2>\n    <p style=\"font-size:16.5px;line-height:1.65;color:#5A5A5D;margin:0 0 26px;\">Cada pilar refuerza a los demás. La organización ordena; la mentoría conduce el liderazgo; la comunicación proyecta el resultado. Juntos, transforman la complejidad médica en control estratégico.<\u002Fp>\n    <div style=\"display:flex;flex-direction:column;gap:14px;\">\n     <sc-for list=\"{{ pillars }}\" as=\"pl\" hint-placeholder-count=\"3\">\n      <div style=\"display:flex;align-items:center;gap:14px;background:#fff;border:1px solid #EAE8E8;border-radius:4px;padding:16px 18px;\">\n       <span style=\"flex:none;width:12px;height:12px;border-radius:50%;background:{{ pl.color }};\"><\u002Fspan>\n       <span style=\"font-family:'Spectral',serif;font-weight:600;font-size:17px;color:#2B2B2D;\">{{ pl.k }}<\u002Fspan>\n      <\u002Fdiv>\n     <\u002Fsc-for>\n    <\u002Fdiv>\n   <\u002Fdiv>\n  <\u002Fdiv>\n <\u002Fsection>\n\n <!-- Fases -->\n <section style=\"padding:clamp(56px,7vw,100px) clamp(20px,5vw,48px);\">\n  <div style=\"max-width:1100px;margin:0 auto;\">\n   <div style=\"text-align:center;max-width:620px;margin:0 auto clamp(40px,5vw,56px);\">\n    <span style=\"font-size:12px;font-weight:600;letter-spacing:2.5px;text-transform:uppercase;color:#B8257F;\">El proceso<\u002Fspan>\n    <h2 style=\"font-family:'Spectral',serif;font-weight:700;font-size:clamp(28px,3.6vw,44px);line-height:1.12;letter-spacing:-.5px;margin:14px 0 0;color:#2B2B2D;\">Cuatro fases de conducción.<\u002Fh2>\n   <\u002Fdiv>\n   <div style=\"display:flex;flex-wrap:wrap;gap:12px;margin-bottom:36px;\">\n    <sc-for list=\"{{ phases }}\" as=\"ph\" hint-placeholder-count=\"4\">\n     <button onclick=\"{{ ph.set }}\" style=\"{{ ph.tabStyle }}\">\n      <span style=\"font-family:'Spectral',serif;font-size:14px;opacity:.7;\">{{ ph.n }}<\u002Fspan>\n      <span style=\"font-weight:600;font-size:14.5px;\">{{ ph.t }}<\u002Fspan>\n     <\u002Fbutton>\n    <\u002Fsc-for>\n   <\u002Fdiv>\n   <div style=\"position:relative;background:#fff;border:1px solid #EAE8E8;border-radius:5px;overflow:hidden;\">\n    <div style=\"height:4px;background:#F0EEEE;\">\n     <div style=\"height:100%;background:linear-gradient(90deg,#C9A961,#B8257F);transition:width .5s ease;width:{{ phaseProgress }};\"><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"padding:clamp(34px,5vw,56px);display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:32px;align-items:center;\">\n     <div>\n      <div style=\"font-family:'Spectral',serif;font-size:clamp(60px,10vw,120px);font-weight:300;color:#F0E6EE;line-height:.8;\">{{ activePhase.n }}<\u002Fdiv>\n     <\u002Fdiv>\n     <div>\n      <h3 style=\"font-family:'Spectral',serif;font-weight:700;font-size:clamp(24px,3vw,34px);line-height:1.15;margin:0 0 14px;color:#B8257F;\">{{ activePhase.t }}<\u002Fh3>\n      <p style=\"font-size:17px;line-height:1.7;color:#5A5A5D;margin:0 0 18px;\">{{ activePhase.d }}<\u002Fp>\n      <p style=\"font-size:15px;line-height:1.65;color:#6D6E71;margin:0;\">{{ activePhase.long }}<\u002Fp>\n     <\u002Fdiv>\n    <\u002Fdiv>\n   <\u002Fdiv>\n  <\u002Fdiv>\n <\u002Fsection>\n\n <section style=\"background:#B8257F;padding:clamp(48px,6vw,80px) clamp(20px,5vw,48px);text-align:center;\">\n  <h2 style=\"font-family:'Spectral',serif;font-weight:600;font-size:clamp(24px,3vw,36px);color:#fff;margin:0 0 24px;line-height:1.25;\">Estructure el sistema que su organización necesita.<\u002Fh2>\n  <button onclick=\"{{ goContacto }}\" style=\"background:#fff;color:#B8257F;border:none;padding:17px 34px;border-radius:3px;font-weight:600;font-size:15px;cursor:pointer;transition:transform .2s;\" style-hover=\"transform:translateY(-2px);\">Solicitar Diagnóstico Estratégico<\u002Fbutton>\n <\u002Fsection>\n<\u002Fmain>\n<\u002Fsc-if>\n\n<!-- ============ SERVICIOS ============ -->\n<sc-if value=\"{{ isServicios }}\" hint-placeholder-val=\"{{ false }}\">\n<main data-screen-label=\"Servicios\">\n <section style=\"max-width:1100px;margin:0 auto;padding:clamp(48px,7vw,90px) clamp(20px,5vw,48px) clamp(24px,3vw,36px);animation:alt-fadeup .7s ease both;\">\n  <span style=\"font-size:12px;font-weight:600;letter-spacing:2.5px;text-transform:uppercase;color:#6D6E71;\">Cómo lo hacemos<\u002Fspan>\n  <h1 style=\"font-family:'Spectral',serif;font-weight:700;font-size:clamp(34px,5vw,56px);line-height:1.08;letter-spacing:-.8px;margin:16px 0 0;color:#2B2B2D;max-width:760px;\">Servicios de conducción estratégica.<\u002Fh1>\n <\u002Fsection>\n <section style=\"max-width:1100px;margin:0 auto;padding:0 clamp(20px,5vw,48px) clamp(48px,6vw,80px);\">\n  <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:20px;\">\n   <sc-for list=\"{{ comoList }}\" as=\"s\" hint-placeholder-count=\"4\">\n    <div style=\"background:#fff;border:1px solid #EAE8E8;border-radius:5px;padding:30px 28px;transition:box-shadow .25s,transform .25s;\" style-hover=\"box-shadow:0 22px 44px -28px rgba(43,43,45,.4);transform:translateY(-3px);\">\n     <div style=\"font-family:'Spectral',serif;font-size:15px;font-weight:600;color:#C9A961;margin-bottom:18px;\">{{ s.n }}<\u002Fdiv>\n     <h3 style=\"font-family:'Spectral',serif;font-weight:600;font-size:21px;color:#2B2B2D;margin:0 0 12px;line-height:1.2;\">{{ s.t }}<\u002Fh3>\n     <p style=\"font-size:15px;line-height:1.6;color:#6D6E71;margin:0;\">{{ s.d }}<\u002Fp>\n    <\u002Fdiv>\n   <\u002Fsc-for>\n  <\u002Fdiv>\n <\u002Fsection>\n\n <section style=\"background:#2B2B2D;color:#fff;padding:clamp(56px,7vw,96px) clamp(20px,5vw,48px);\">\n  <div style=\"max-width:1100px;margin:0 auto;\">\n   <div style=\"margin-bottom:clamp(36px,4vw,52px);\">\n    <span style=\"font-size:12px;font-weight:600;letter-spacing:2.5px;text-transform:uppercase;color:#C9A961;\">Desglose corporativo<\u002Fspan>\n    <h2 style=\"font-family:'Spectral',serif;font-weight:700;font-size:clamp(28px,3.6vw,42px);line-height:1.12;margin:14px 0 0;max-width:680px;\">Bloques claros y ejecutivos.<\u002Fh2>\n   <\u002Fdiv>\n   <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:1px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.1);border-radius:5px;overflow:hidden;\">\n    <sc-for list=\"{{ desgloseList }}\" as=\"d\" hint-placeholder-count=\"4\">\n     <div style=\"background:#2B2B2D;padding:34px 30px;transition:background .25s;\" style-hover=\"background:#34343680;\">\n      <h3 style=\"font-family:'Spectral',serif;font-weight:600;font-size:20px;color:#fff;margin:0 0 12px;line-height:1.25;\"><span style=\"color:#B8257F;\">·<\u002Fspan> {{ d.t }}<\u002Fh3>\n      <p style=\"font-size:15px;line-height:1.65;color:#B5B5B8;margin:0;\">{{ d.d }}<\u002Fp>\n     <\u002Fdiv>\n    <\u002Fsc-for>\n   <\u002Fdiv>\n  <\u002Fdiv>\n <\u002Fsection>\n\n <section style=\"padding:clamp(50px,6vw,84px) clamp(20px,5vw,48px);text-align:center;\">\n  <p style=\"max-width:740px;margin:0 auto 30px;font-family:'Spectral',serif;font-weight:500;font-size:clamp(21px,2.6vw,30px);line-height:1.4;color:#2B2B2D;\">El crecimiento sostenible de una institución de salud no depende de acciones aisladas. Requiere un sistema que ordene la operación, potencie al liderazgo y proyecte una reputación impecable.<\u002Fp>\n  <button onclick=\"{{ goContacto }}\" style=\"background:#B8257F;color:#fff;border:none;padding:17px 34px;border-radius:3px;font-weight:600;font-size:15px;cursor:pointer;transition:background .2s;\" style-hover=\"background:#9c1d6b;\">Solicitar Diagnóstico Estratégico<\u002Fbutton>\n <\u002Fsection>\n<\u002Fmain>\n<\u002Fsc-if>\n\n<!-- ============ NOSOTROS ============ -->\n<sc-if value=\"{{ isNosotros }}\" hint-placeholder-val=\"{{ false }}\">\n<main data-screen-label=\"Nosotros\">\n <section style=\"max-width:980px;margin:0 auto;padding:clamp(48px,7vw,96px) clamp(20px,5vw,48px) clamp(32px,4vw,48px);animation:alt-fadeup .7s ease both;\">\n  <span style=\"font-size:12px;font-weight:600;letter-spacing:2.5px;text-transform:uppercase;color:#6D6E71;\">Quiénes somos<\u002Fspan>\n  <h1 style=\"font-family:'Spectral',serif;font-weight:700;font-size:clamp(32px,4.6vw,54px);line-height:1.1;letter-spacing:-.7px;margin:16px 0 26px;color:#2B2B2D;\">Estrategia, organización y comunicación para el sector salud.<\u002Fh1>\n  <p style=\"font-size:18px;line-height:1.7;color:#5A5A5D;max-width:740px;margin:0 0 16px;\">Somos consultores estratégicos que ayudan a empresas y profesionales de la salud a ordenar, estructurar y potenciar sus proyectos.<\u002Fp>\n  <p style=\"font-size:18px;line-height:1.7;color:#5A5A5D;max-width:740px;margin:0;\">Combinamos programas de mentoría, asesorías de organización, planes de estructuración y comunicación para mayor eficiencia y crecimiento sostenible.<\u002Fp>\n <\u002Fsection>\n\n <section style=\"background:#F5F5F5;padding:clamp(52px,6vw,88px) clamp(20px,5vw,48px);\">\n  <div style=\"max-width:1000px;margin:0 auto;\">\n   <h2 style=\"font-family:'Spectral',serif;font-weight:700;font-size:clamp(28px,3.6vw,42px);line-height:1.12;letter-spacing:-.5px;margin:0 0 14px;color:#2B2B2D;\">¿Por qué elegirnos?<\u002Fh2>\n   <p style=\"font-size:17px;line-height:1.7;color:#5A5A5D;max-width:760px;margin:0 0 36px;\">Porque entendemos que una buena comunicación es el resultado de una organización bien estructurada. No nos limitamos a gestionar canales digitales: nos involucramos en el corazón de su proyecto. Aportamos orden, visión empresarial y un profundo respeto por la ética médica.<\u002Fp>\n   <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:20px;\">\n    <sc-for list=\"{{ porques }}\" as=\"r\" hint-placeholder-count=\"3\">\n     <div style=\"background:#fff;border:1px solid #EAE8E8;border-left:3px solid #C9A961;border-radius:4px;padding:26px 24px;\">\n      <h3 style=\"font-family:'Spectral',serif;font-weight:600;font-size:19px;color:#B8257F;margin:0 0 10px;\">{{ r.t }}<\u002Fh3>\n      <p style=\"font-size:15px;line-height:1.6;color:#6D6E71;margin:0;\">{{ r.d }}<\u002Fp>\n     <\u002Fdiv>\n    <\u002Fsc-for>\n   <\u002Fdiv>\n  <\u002Fdiv>\n <\u002Fsection>\n\n <section style=\"padding:clamp(52px,6vw,88px) clamp(20px,5vw,48px);\">\n  <div style=\"max-width:1000px;margin:0 auto;display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:clamp(32px,4vw,56px);\">\n   <div>\n    <h3 style=\"font-family:'Spectral',serif;font-weight:600;font-size:22px;color:#2B2B2D;margin:0 0 12px;\">Aliados de la alta dirección<\u002Fh3>\n    <p style=\"font-size:16px;line-height:1.7;color:#5A5A5D;margin:0;\">Trabajamos junto a CEOs de laboratorios, directores de clínicas y jefes de servicio. Nuestro cliente no busca «likes»: busca orden, estructura y liderazgo.<\u002Fp>\n   <\u002Fdiv>\n   <div>\n    <h3 style=\"font-family:'Spectral',serif;font-weight:600;font-size:22px;color:#2B2B2D;margin:0 0 12px;\">Tono institucional y ético<\u002Fh3>\n    <p style=\"font-size:16px;line-height:1.7;color:#5A5A5D;margin:0;\">Analítico, ejecutivo y de alta confianza. Transformamos la complejidad científica en mensajes claros, rigurosos y con alto impacto humano.<\u002Fp>\n   <\u002Fdiv>\n  <\u002Fdiv>\n <\u002Fsection>\n<\u002Fmain>\n<\u002Fsc-if>\n\n<!-- ============ CONTACTO ============ -->\n<sc-if value=\"{{ isContacto }}\" hint-placeholder-val=\"{{ false }}\">\n<main data-screen-label=\"Contacto\">\n <section style=\"max-width:1100px;margin:0 auto;padding:clamp(48px,7vw,90px) clamp(20px,5vw,48px) clamp(56px,7vw,96px);display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:clamp(40px,5vw,72px);align-items:start;\">\n  <div style=\"animation:alt-fadeup .7s ease both;\">\n   <span style=\"font-size:12px;font-weight:600;letter-spacing:2.5px;text-transform:uppercase;color:#6D6E71;\">Contacto<\u002Fspan>\n   <h1 style=\"font-family:'Spectral',serif;font-weight:700;font-size:clamp(32px,4.4vw,52px);line-height:1.08;letter-spacing:-.7px;margin:16px 0 20px;color:#2B2B2D;\">Solicite su diagnóstico estratégico.<\u002Fh1>\n   <p style=\"font-size:17px;line-height:1.7;color:#5A5A5D;margin:0 0 36px;max-width:440px;\">Cuéntenos sobre su organización. Le responderemos con una propuesta de evaluación inicial de su estructura.<\u002Fp>\n   <div style=\"display:flex;flex-direction:column;gap:22px;\">\n    <sc-for list=\"{{ contactInfo }}\" as=\"c\" hint-placeholder-count=\"3\">\n     <div>\n      <div style=\"font-size:11.5px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:#C9A961;margin-bottom:5px;\">{{ c.label }}<\u002Fdiv>\n      <div style=\"font-size:16.5px;color:#3A3A3C;font-weight:500;\">{{ c.value }}<\u002Fdiv>\n     <\u002Fdiv>\n    <\u002Fsc-for>\n   <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"background:#fff;border:1px solid #EAE8E8;border-radius:6px;padding:clamp(28px,4vw,44px);box-shadow:0 30px 70px -40px rgba(43,43,45,.4);\">\n   <sc-if value=\"{{ sent }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"text-align:center;padding:30px 10px;\">\n     <div style=\"width:64px;height:64px;border-radius:50%;background:#F0E6EE;display:flex;align-items:center;justify-content:center;margin:0 auto 22px;\">\n      <svg viewBox=\"0 0 120 100\" width=\"34\" style=\"overflow:visible;\"><line x1=\"8\" y1=\"50\" x2=\"48\" y2=\"50\" stroke=\"#6D6E71\" stroke-width=\"7\" stroke-linecap=\"round\"><\u002Fline><line x1=\"48\" y1=\"50\" x2=\"106\" y2=\"9\" stroke=\"#B8257F\" stroke-width=\"7\" stroke-linecap=\"round\"><\u002Fline><line x1=\"48\" y1=\"50\" x2=\"106\" y2=\"91\" stroke=\"#B8257F\" stroke-width=\"7\" stroke-linecap=\"round\"><\u002Fline><circle cx=\"48\" cy=\"50\" r=\"11\" fill=\"#C9A961\"><\u002Fcircle><\u002Fsvg>\n     <\u002Fdiv>\n     <h3 style=\"font-family:'Spectral',serif;font-weight:700;font-size:26px;color:#2B2B2D;margin:0 0 10px;\">Solicitud recibida<\u002Fh3>\n     <p style=\"font-size:16px;line-height:1.6;color:#6D6E71;margin:0;\">Gracias. Nuestro equipo le contactará para coordinar su diagnóstico estratégico.<\u002Fp>\n    <\u002Fdiv>\n   <\u002Fsc-if>\n   <sc-if value=\"{{ notSent }}\" hint-placeholder-val=\"{{ true }}\">\n    <form onsubmit=\"{{ onSubmit }}\" data-form=\"\" style=\"display:grid;grid-template-columns:1fr 1fr;gap:18px;\">\n     <sc-for list=\"{{ formFields }}\" as=\"f\" hint-placeholder-count=\"6\">\n      <div style=\"{{ f.wrap }}\">\n       <label style=\"display:block;font-size:12.5px;font-weight:600;letter-spacing:.4px;color:#3A3A3C;margin-bottom:7px;\">{{ f.label }}<\u002Flabel>\n       <sc-if value=\"{{ f.isArea }}\" hint-placeholder-val=\"{{ false }}\">\n        <textarea value=\"{{ f.value }}\" onchange=\"{{ f.onInput }}\" rows=\"4\" placeholder=\"{{ f.ph }}\" style=\"width:100%;border:1px solid #DCDADA;border-radius:4px;padding:13px 14px;font-size:15px;color:#2B2B2D;outline:none;resize:vertical;transition:border-color .2s;\" style-focus=\"border-color:#B8257F;\"><\u002Ftextarea>\n       <\u002Fsc-if>\n       <sc-if value=\"{{ f.isInput }}\" hint-placeholder-val=\"{{ true }}\">\n        <input value=\"{{ f.value }}\" onchange=\"{{ f.onInput }}\" type=\"{{ f.type }}\" placeholder=\"{{ f.ph }}\" style=\"width:100%;border:1px solid #DCDADA;border-radius:4px;padding:13px 14px;font-size:15px;color:#2B2B2D;outline:none;transition:border-color .2s;\" style-focus=\"border-color:#B8257F;\">\n       <\u002Fsc-if>\n      <\u002Fdiv>\n     <\u002Fsc-for>\n     <button type=\"submit\" style=\"grid-column:1 / -1;background:#B8257F;color:#fff;border:none;padding:17px;border-radius:4px;font-weight:600;font-size:15.5px;letter-spacing:.3px;cursor:pointer;margin-top:4px;transition:background .2s;\" style-hover=\"background:#9c1d6b;\">Solicitar Diagnóstico Estratégico<\u002Fbutton>\n    <\u002Fform>\n   <\u002Fsc-if>\n  <\u002Fdiv>\n <\u002Fsection>\n<\u002Fmain>\n<\u002Fsc-if>\n\n<!-- ============ FOOTER ============ -->\n<footer style=\"background:#232325;color:#fff;padding:clamp(48px,6vw,72px) clamp(20px,5vw,48px) 36px;\">\n <div style=\"max-width:1240px;margin:0 auto;display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:40px;\">\n  <div>\n   <div style=\"display:flex;align-items:center;gap:11px;margin-bottom:18px;\">\n    <svg viewBox=\"0 0 120 100\" width=\"34\" height=\"28\" style=\"overflow:visible;\"><line x1=\"8\" y1=\"50\" x2=\"48\" y2=\"50\" stroke=\"#9a9a9d\" stroke-width=\"6\" stroke-linecap=\"round\"><\u002Fline><line x1=\"48\" y1=\"50\" x2=\"106\" y2=\"9\" stroke=\"#B8257F\" stroke-width=\"6\" stroke-linecap=\"round\"><\u002Fline><line x1=\"48\" y1=\"50\" x2=\"106\" y2=\"91\" stroke=\"#B8257F\" stroke-width=\"6\" stroke-linecap=\"round\"><\u002Fline><circle cx=\"48\" cy=\"50\" r=\"10\" fill=\"#C9A961\"><\u002Fcircle><\u002Fsvg>\n    <span style=\"font-family:'Spectral',serif;font-weight:600;font-size:22px;letter-spacing:2px;color:#fff;\">ALTUS<sup style=\"font-size:8px;top:-9px;\">®<\u002Fsup><\u002Fspan>\n   <\u002Fdiv>\n   <p style=\"font-size:14px;line-height:1.6;color:#9a9a9d;margin:0;max-width:260px;\">Sistema de Conducción Estratégica en Salud. Estrategia, organización y comunicación.<\u002Fp>\n  <\u002Fdiv>\n  <div>\n   <div style=\"font-size:12px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:#C9A961;margin-bottom:16px;\">Navegación<\u002Fdiv>\n   <div style=\"display:flex;flex-direction:column;gap:11px;\">\n    <sc-for list=\"{{ nav }}\" as=\"item\" hint-placeholder-count=\"5\">\n     <a onclick=\"{{ item.go }}\" style=\"font-size:14.5px;color:#C5C5C8;cursor:pointer;transition:color .2s;\" style-hover=\"color:#fff;\">{{ item.label }}<\u002Fa>\n    <\u002Fsc-for>\n   <\u002Fdiv>\n  <\u002Fdiv>\n  <div>\n   <div style=\"font-size:12px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:#C9A961;margin-bottom:16px;\">Contacto<\u002Fdiv>\n   <div style=\"display:flex;flex-direction:column;gap:11px;\">\n    <sc-for list=\"{{ contactInfo }}\" as=\"c\" hint-placeholder-count=\"3\">\n     <span style=\"font-size:14.5px;color:#C5C5C8;\">{{ c.value }}<\u002Fspan>\n    <\u002Fsc-for>\n   <\u002Fdiv>\n  <\u002Fdiv>\n <\u002Fdiv>\n <div style=\"max-width:1240px;margin:36px auto 0;padding-top:24px;border-top:1px solid rgba(255,255,255,.1);font-size:13px;color:#7a7a7d;\">© 2026 ALTUS® · Manual de Identidad Visual v2.0<\u002Fdiv>\n<\u002Ffooter>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;motionOn&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;},&quot;phaseAutoplay&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;},&quot;accentBlocks&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;}}\">\nclass Component extends DCLogic {\n  state = { page:'inicio', phase:0, menuOpen:false, sent:false,\n    form:{ nombre:'', org:'', cargo:'', email:'', tel:'', msg:'' } };\n\n  componentDidMount(){\n    if(this.props.phaseAutoplay ?? false){\n      this._t = setInterval(()=>{\n        if(this.state.page==='sistema'){ this.setState(s=>({ phase:(s.phase+1)%4 })); }\n      }, 4500);\n    }\n  }\n  componentWillUnmount(){ if(this._t) clearInterval(this._t); }\n\n  go = (p) => {\n    this.setState({ page:p, menuOpen:false });\n    try { window.scrollTo({ top:0, behavior:'auto' }); } catch(e) { window.scrollTo(0,0); }\n  };\n  setField = (k,v) => this.setState(s=>({ form:{ ...s.form, [k]:v } }));\n  onSubmit = (e) => { e.preventDefault(); this.setState({ sent:true }); try{window.scrollTo({top:0,behavior:'auto'});}catch(_){} };\n\n  renderVals(){\n    const page = this.state.page;\n    const accentBlocks = this.props.accentBlocks ?? true;\n\n    const navDef = [['inicio','Inicio'],['sistema','El Sistema'],['servicios','Servicios'],['nosotros','Nosotros'],['contacto','Contacto']];\n    const nav = navDef.map(([id,label])=>{\n      const active = page===id;\n      return {\n        id, label,\n        go: ()=>this.go(id),\n        style: `font-size:15px;font-weight:${active?600:500};color:${active?'#B8257F':'#3A3A3C'};cursor:pointer;padding:6px 0;border-bottom:2px solid ${active?'#C9A961':'transparent'};transition:color .2s;`,\n        mstyle: `font-size:17px;font-weight:${active?600:500};color:${active?'#B8257F':'#3A3A3C'};cursor:pointer;padding:12px 0;border-bottom:1px solid #F0EEEE;`\n      };\n    });\n\n    const pillars = [\n      { k:'Organización', d:'Procesos internos y flujos de trabajo alineados con el negocio.', color:'#6D6E71' },\n      { k:'Mentoría', d:'Conducción del liderazgo y los equipos en decisiones clave.', color:'#B8257F' },\n      { k:'Comunicación', d:'Mensajes rigurosos, éticos y de alto impacto humano.', color:'#C9A961' }\n    ];\n\n    const phaseDef = [\n      { n:'01', t:'Diagnóstico y Auditoría', d:'Evaluación de la estructura actual.', long:'Analizamos procesos, equipos y comunicación para identificar dónde se diluye el potencial de la organización.' },\n      { n:'02', t:'Planes de Estructuración', d:'Diseño del nuevo modelo organizativo.', long:'Construimos el mapa de ruta integral para escalar de forma ordenada, segura y a medida de su institución.' },\n      { n:'03', t:'Mentoría e Implementación', d:'Acompañamiento al liderazgo y equipos.', long:'Guiamos paso a paso a directores y equipos en la adopción del nuevo modelo y la toma de decisiones clave.' },\n      { n:'04', t:'Conducción de la Comunicación', d:'Proyección externa e interna de la marca.', long:'Gestionamos reputación y posicionamiento ético para que la comunicación refleje la verdadera calidad médica.' }\n    ];\n    const phase = this.state.phase;\n    const phases = phaseDef.map((p,i)=>{\n      const active = i===phase;\n      return { ...p, set:()=>this.setState({ phase:i }),\n        tabStyle:`display:flex;flex-direction:column;gap:3px;text-align:left;flex:1 1 200px;background:${active?'#2B2B2D':'#fff'};color:${active?'#fff':'#3A3A3C'};border:1px solid ${active?'#2B2B2D':'#E4E2E2'};border-radius:4px;padding:16px 18px;cursor:pointer;transition:all .25s;` };\n    });\n    const activePhase = phaseDef[phase];\n    const phaseProgress = ((phase+1)/4*100) + '%';\n\n    const comoList = [\n      { n:'01', t:'Mentorías Estratégicas', d:'Guiamos paso a paso a profesionales y equipos en la toma de decisiones clave para su posicionamiento.' },\n      { n:'02', t:'Asesorías de Organización', d:'Optimizamos los procesos internos y flujos de trabajo para alinear la operación con los objetivos de negocio.' },\n      { n:'03', t:'Planes de Estructuración', d:'Diseñamos el mapa de ruta integral que su empresa médica necesita para escalar de forma ordenada y segura.' },\n      { n:'04', t:'Comunicación Ética', d:'Transformamos la complejidad científica en mensajes claros, rigurosos y con alto impacto humano.' }\n    ];\n    const desgloseList = [\n      { t:'Consultoría Organizacional', d:'Rediseño de procesos institucionales, flujos de trabajo y alineación de equipos médicos.' },\n      { t:'Programas de Mentoría', d:'Conducción uno a uno para directores médicos, fundadores de clínicas y profesionales que buscan escalar su práctica.' },\n      { t:'Planes de Estructuración Diversos', d:'Modelos a medida para la apertura de nuevas áreas, digitalización de servicios o expansión de laboratorios.' },\n      { t:'Comunicación Estratégica', d:'Gestión de reputación, manejo de crisis y posicionamiento ético en el sector Healthcare.' }\n    ];\n    const porques = [\n      { t:'Orden', d:'Estructuramos la operación para que cada proceso sirva a los objetivos de negocio.' },\n      { t:'Visión empresarial', d:'Nos involucramos en el corazón del proyecto, no solo en sus canales.' },\n      { t:'Ética médica', d:'Un profundo respeto por el rigor científico y la responsabilidad del sector.' }\n    ];\n    const problemas = [\n      { n:'01', t:'¿Falta de alineación en el equipo?' },\n      { n:'02', t:'¿Procesos internos desordenados?' },\n      { n:'03', t:'¿Comunicación que no refleja su verdadera calidad médica?' }\n    ];\n    const contactInfo = [\n      { label:'Correo', value:'contacto@altus.health' },\n      { label:'Teléfono', value:'+00 000 000 000' },\n      { label:'Atención', value:'Lun – Vie · 9:00 a 18:00' }\n    ];\n\n    const f = this.state.form;\n    const mk = (key,label,ph,type,full)=>({ key,label,ph,type, value:f[key], full,\n      isInput:type!=='textarea', isArea:type==='textarea',\n      wrap: full ? 'grid-column:1 / -1;' : 'grid-column:span 1;',\n      onInput:(e)=>this.setField(key, e.target.value) });\n    const formFields = [\n      mk('nombre','Nombre completo','Dr. / Dra. …','text',true),\n      mk('org','Organización','Clínica, laboratorio, consultorio','text',false),\n      mk('cargo','Cargo','Director, fundador…','text',false),\n      mk('email','Correo electrónico','nombre@organizacion.com','email',false),\n      mk('tel','Teléfono','+00 000 000','tel',false),\n      mk('msg','Cuéntenos su desafío','¿Qué necesita ordenar o estructurar?','textarea',true)\n    ];\n\n    return {\n      nav, pillars, phases, activePhase, phaseProgress,\n      comoList, desgloseList, porques, problemas, contactInfo, formFields,\n      menuOpen:this.state.menuOpen, toggleMenu:()=>this.setState(s=>({menuOpen:!s.menuOpen})),\n      sent:this.state.sent, notSent:!this.state.sent, onSubmit:this.onSubmit,\n      isInicio:page==='inicio', isSistema:page==='sistema', isServicios:page==='servicios',\n      isNosotros:page==='nosotros', isContacto:page==='contacto',\n      goInicio:()=>this.go('inicio'), goSistema:()=>this.go('sistema'), goContacto:()=>this.go('contacto'),\n      bandStyle: accentBlocks ? 'background:#B8257F;' : 'background:#F5F5F5;border-top:1px solid #ECEAEA;border-bottom:1px solid #ECEAEA;',\n      bandText: accentBlocks ? '#FFFFFF' : '#2B2B2D',\n      bandLine: accentBlocks ? 'rgba(255,255,255,.85)' : '#6D6E71',\n      bandArm: accentBlocks ? '#FFFFFF' : '#B8257F',\n      orbitPlay: (this.props.motionOn ?? true) ? 'running' : 'paused'\n    };\n  }\n}\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"},"entry":"ALTUS-standalone.dc"}
  </script>
